<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Boxes - Gestão Documental</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* --- ESTILOS GERAIS (Padrão do Hub) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1600px; /* Mais largo para caber as estantes */
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .header h1 { font-size: 32px; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .header p { opacity: 0.9; font-size: 16px; }

        .content { padding: 40px; }

        /* --- UPLOAD --- */
        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-area:hover { border-color: #667eea; background: #eef2ff; transform: translateY(-2px); }
        .upload-icon { font-size: 48px; color: #667eea; margin-bottom: 15px; }

        /* --- ESTATÍSTICAS --- */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stat-value { font-size: 28px; font-weight: 800; color: #1e293b; }
        .stat-label { font-size: 12px; text-transform: uppercase; color: #64748b; font-weight: 700; margin-top: 5px; }

        /* --- VISUALIZAÇÃO DE BOXES --- */
        #results { display: none; animation: fadeIn 0.5s; }

        .legend {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            padding: 15px; background: #f8fafc; border-radius: 10px; margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #475569; }
        .legend-color { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); }

        .shelves-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* Estante (Conjunto de 49 boxes) */
        .shelf {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            width: fit-content;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .shelf:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); z-index: 5; }

        .shelf-header {
            text-align: center; font-size: 11px; font-weight: 700; color: #64748b;
            margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #f1f5f9;
        }

        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7x7 */
            gap: 2px;
        }

        .box {
            width: 28px; height: 28px;
            background: #f1f5f9;
            border: 1px solid rgba(0,0,0,0.05);
            font-size: 0px; /* Esconde número para visual limpo */
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.1s;
        }
        
        .box:hover {
            transform: scale(1.5);
            z-index: 10;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        /* --- TOOLTIP --- */
        .tooltip {
            position: fixed; display: none; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(4px);
            color: white; padding: 12px; border-radius: 8px;
            font-size: 12px; pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 200px;
        }
        .tooltip-header { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; margin-bottom: 5px; font-weight: 700; font-size: 14px; }
        .tooltip-row { display: flex; justify-content: space-between; margin-bottom: 3px; }

        /* Loading */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 1000;
            display: none; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #e2e8f0;
            border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <h3 style="margin-top: 20px; color: #667eea;">Mapeando Arquivo...</h3>
        <p style="color: #666;">Gerando visualização de 7.000 posições.</p>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-th"></i> Visualizador de Boxes</h1>
            <p>Mapa Interativo de Ocupação do Arquivo Físico</p>
        </div>

        <div class="content">
            
            <div id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h3>Importar Mapa de Boxes</h3>
                    <p style="color:#94a3b8; margin-bottom:15px;">Arraste o arquivo Excel (.xlsx) com o status dos boxes.</p>
                    <input type="file" id="fileInput" accept=".xlsx, .xls" hidden>
                    <button class="btn" style="background:#667eea; color:white; padding:10px 25px; border:none; border-radius:6px; cursor:pointer;" onclick="document.getElementById('fileInput').click()">
                        Selecionar Arquivo
                    </button>
                </div>
            </div>

            <div id="results">
                
                <div class="stats-bar">
                    <div class="stat-card">
                        <div class="stat-value" style="color: #64748b">7.000</div>
                        <div class="stat-label">Capacidade Total</div>
                    </div>
                    <div class="stat-card" style="border-bottom: 4px solid #10b981;">
                        <div class="stat-value" id="valOcupados" style="color: #10b981">0</div>
                        <div class="stat-label">Boxes Ocupados</div>
                    </div>
                    <div class="stat-card" style="border-bottom: 4px solid #ef4444;">
                        <div class="stat-value" id="valVazios" style="color: #ef4444">0</div>
                        <div class="stat-label">Boxes Livres</div>
                    </div>
                    <div class="stat-card" style="border-bottom: 4px solid #3b82f6;">
                        <div class="stat-value" id="valDocs" style="color: #3b82f6">0</div>
                        <div class="stat-label">Total Documentos</div>
                    </div>
                </div>

                <div class="legend" id="legendContainer"></div>

                <div class="shelves-container" id="shelvesContainer"></div>

                <div style="text-align: center; margin-top: 40px;">
                    <button onclick="location.reload()" style="background: #e2e8f0; color: #475569; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                        <i class="fas fa-undo"></i> Carregar Novo Arquivo
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // --- LÓGICA DE UPLOAD E PROCESSAMENTO ---
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.background = '#eef2ff'; uploadArea.style.borderColor = '#667eea'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = '#f8fafc'; uploadArea.style.borderColor = '#cbd5e0'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            if(e.dataTransfer.files.length) processarArquivo(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) processarArquivo(e.target.files[0]);
        });

        function processarArquivo(file) {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('uploadSection').style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, {header: 1});

                    // Parseamento Inteligente
                    // Assume que a linha 3 (index 2) tem os cabeçalhos: Box, Status1, Status2... Total
                    const headers = json[2];
                    const rows = json.slice(3);
                    
                    const dados = analisarDados(headers, rows);
                    
                    setTimeout(() => {
                        renderizar(dados);
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('results').style.display = 'block';
                    }, 500);

                } catch (err) {
                    alert('Erro ao ler arquivo. Verifique o formato.');
                    location.reload();
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function analisarDados(headers, rows) {
            // Identifica colunas de status (ignora Box e Total)
            const statusCols = headers.map((h, i) => ({name: h, index: i}))
                                      .filter(c => c.name && !['BOX','TOTAL','Total','Box'].includes(c.name));
            
            const boxes = new Array(7001).fill(null); // Index 1-7000
            let totalOcupados = 0;
            let totalDocs = 0;
            const statusTotals = {};

            rows.forEach(row => {
                const boxNum = parseInt(row[0]); // Assume col 0 é Box
                if(boxNum > 0 && boxNum <= 7000) {
                    const boxData = { id: boxNum, total: 0, content: {} };
                    
                    statusCols.forEach(col => {
                        const val = parseInt(row[col.index]) || 0;
                        if(val > 0) {
                            boxData.content[col.name] = val;
                            boxData.total += val;
                            statusTotals[col.name] = (statusTotals[col.name] || 0) + val;
                        }
                    });

                    if(boxData.total > 0) {
                        boxes[boxNum] = boxData;
                        totalOcupados++;
                        totalDocs += boxData.total;
                    }
                }
            });

            return { boxes, statusCols, statusTotals, totalOcupados, totalDocs };
        }

        // --- RENDERIZAÇÃO ---
        function renderizar(dados) {
            // Atualiza KPIs
            document.getElementById('valOcupados').innerText = dados.totalOcupados.toLocaleString();
            document.getElementById('valVazios').innerText = (7000 - dados.totalOcupados).toLocaleString();
            document.getElementById('valDocs').innerText = dados.totalDocs.toLocaleString();

            // Gera Cores para Status
            const cores = gerarPaleta(dados.statusCols.length);
            const corMap = {};
            dados.statusCols.forEach((c, i) => corMap[c.name] = cores[i]);

            // Legenda
            const legendHtml = dados.statusCols.map(c => `
                <div class="legend-item">
                    <div class="legend-color" style="background:${corMap[c.name]}"></div>
                    ${c.name}
                </div>
            `).join('') + `<div class="legend-item"><div class="legend-color" style="background:#f1f5f9; border:1px dashed #cbd5e0"></div>Vazio</div>`;
            document.getElementById('legendContainer').innerHTML = legendHtml;

            // Grid de Estantes (Shelves)
            const container = document.getElementById('shelvesContainer');
            container.innerHTML = '';

            const boxesPorEstante = 49;
            const totalEstantes = Math.ceil(7000 / boxesPorEstante);

            // Fragmento para performance
            const fragment = document.createDocumentFragment();

            for(let i=0; i<totalEstantes; i++) {
                const start = i * boxesPorEstante + 1;
                const end = Math.min((i+1) * boxesPorEstante, 7000);
                
                const shelf = document.createElement('div');
                shelf.className = 'shelf';
                
                const header = document.createElement('div');
                header.className = 'shelf-header';
                header.innerText = `${start} - ${end}`;
                shelf.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'shelf-grid';

                for(let b=start; b<=end; b++) {
                    const boxDiv = document.createElement('div');
                    boxDiv.className = 'box';
                    const boxData = dados.boxes[b];

                    if(boxData) {
                        // Gradiente baseado no conteúdo
                        const gradient = gerarGradiente(boxData, corMap);
                        boxDiv.style.background = gradient;
                        
                        // Eventos Mouse
                        boxDiv.onmouseenter = (e) => showTooltip(e, boxData);
                        boxDiv.onmouseleave = hideTooltip;
                    } else {
                        // Vazio
                        boxDiv.onmouseenter = (e) => showTooltip(e, {id: b, total: 0});
                        boxDiv.onmouseleave = hideTooltip;
                    }
                    grid.appendChild(boxDiv);
                }
                shelf.appendChild(grid);
                fragment.appendChild(shelf);
            }
            container.appendChild(fragment);
        }

        // --- UTILITÁRIOS ---
        function gerarPaleta(n) {
            // Paleta HSL profissional
            const cores = [];
            const step = 360 / n;
            for(let i=0; i<n; i++) {
                cores.push(`hsl(${Math.floor(i*step)}, 70%, 60%)`);
            }
            return cores;
        }

        function gerarGradiente(box, corMap) {
            const entries = Object.entries(box.content);
            if(entries.length === 1) return corMap[entries[0][0]];
            
            // Linear Gradient para múltiplos status
            let stops = [];
            let acc = 0;
            entries.forEach(([status, qtd]) => {
                const pct = (qtd / box.total) * 100;
                const color = corMap[status];
                stops.push(`${color} ${acc}%`);
                acc += pct;
                stops.push(`${color} ${acc}%`);
            });
            return `linear-gradient(135deg, ${stops.join(', ')})`;
        }

        // --- TOOLTIP ---
        const tooltip = document.getElementById('tooltip');
        
        function showTooltip(e, data) {
            const rect = e.target.getBoundingClientRect();
            let html = `<div class="tooltip-header">📦 Box ${data.id}</div>`;
            
            if(data.total > 0) {
                html += `<div class="tooltip-row"><span>Total:</span> <strong>${data.total}</strong></div>`;
                html += `<hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:5px 0;">`;
                for(const [k, v] of Object.entries(data.content)) {
                    html += `<div class="tooltip-row"><span style="opacity:0.8">${k}:</span> <span>${v}</span></div>`;
                }
            } else {
                html += `<div style="color:#94a3b8; font-style:italic;">Vazio / Disponível</div>`;
            }

            tooltip.innerHTML = html;
            tooltip.style.display = 'block';
            
            // Posicionamento inteligente
            const top = rect.top + window.scrollY - tooltip.offsetHeight - 10;
            const left = rect.left + window.scrollX + (rect.width/2) - (tooltip.offsetWidth/2);
            
            tooltip.style.top = `${top}px`;
            tooltip.style.left = `${left}px`;
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

    </script>
</body>
</html>
