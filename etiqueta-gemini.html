<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressor de Etiquetas - Maximizado</title>
    <style>
        /* --- RESET E ESTILOS GERAIS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }

        /* --- UI (Tela do computador) --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }

        .content { padding: 30px; }

        /* Formulários */
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .form-group { position: relative; margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #4a5568; }
        .form-group input {
            width: 100%; padding: 10px; border: 2px solid #e2e8f0;
            border-radius: 6px; font-size: 15px;
        }

        /* Resultados da Busca */
        .search-results {
            position: absolute; top: 100%; left: 0; right: 0;
            max-height: 250px; overflow-y: auto;
            border: 1px solid #ddd; background: white; z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none;
        }
        .search-results.show { display: block; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .search-item:hover { background: #f0f4ff; }

        /* Cards de Tipo */
        .tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tipo-card {
            border: 2px solid #e2e8f0; border-radius: 8px; padding: 15px;
            cursor: pointer; text-align: center; background: white;
        }
        .tipo-card.selected {
            border-color: #667eea; background: #f8f9ff;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        /* Botões */
        .btn {
            padding: 12px 25px; border: none; border-radius: 6px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            color: white; background: #667eea; width: 100%;
        }
        .btn:disabled { background: #cbd5e0; cursor: not-allowed; }

        .preview-section { display: none; margin-top: 30px; background: #fff; padding: 20px; border-radius: 10px; }
        .preview-section.show { display: block; }
        .preview-controls { margin-bottom: 15px; display: flex; gap: 10px; background: #edf2f7; padding: 10px; border-radius: 6px; align-items: center;}

        /* --- ESTILOS DE IMPRESSÃO (Otimização A4) --- */
        
        /* Configuração da Página Física */
        @page {
            size: A4;
            margin: 0; /* Remove margens do navegador para controle total */
        }

        .etiquetas-page {
            width: 210mm;
            height: 297mm;
            background: white;
            /* Margem de segurança de 5mm para impressoras comuns não cortarem */
            padding: 5mm; 
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr; /* 3 linhas exatas */
            gap: 2mm; /* Pequeno espaço para corte */
            box-sizing: border-box;
        }

        .etiqueta {
            border: 2px solid #000;
            border-radius: 4px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Ocupa 100% da célula do grid */
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Cabeçalho */
        .etiqueta-header {
            background-color: #e2e8f0;
            padding: 5px 8px;
            border-bottom: 2px solid #000;
            text-align: center;
            height: 45px; /* Altura fixa para cabeçalho */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .etiqueta-header-title {
            font-size: 7pt;
            text-transform: uppercase;
            color: #4a5568;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .etiqueta-header-unit {
            font-size: 10pt;
            font-weight: 800;
            color: #000;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Corpo */
        .etiqueta-body {
            padding: 8px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .etiqueta-row {
            display: flex;
            align-items: baseline;
            padding: 4px 0;
            border-bottom: 1px dotted #a0aec0;
        }
        
        .etiqueta-row:last-of-type { border-bottom: none; }

        .etiqueta-label {
            font-size: 8pt;
            font-weight: 700;
            color: #2d3748;
            min-width: 85px;
        }

        .etiqueta-value {
            font-size: 10pt;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
            color: #000;
            flex: 1;
        }

        /* Rodapé / Status */
        .etiqueta-footer {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #000;
            font-weight: 800;
            font-size: 11pt;
            text-transform: uppercase;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .status-permanente { background-color: #000; color: white; }
        .status-eliminacao { background-color: #fff; color: #000; }

        /* Media Query para Impressão */
        @media print {
            body { padding: 0; background: white; }
            .container { width: 100%; max-width: none; box-shadow: none; margin: 0; }
            .header, .form-section, .btn, .preview-controls, h2 { display: none !important; }
            .preview-section { display: block !important; padding: 0; margin: 0; border: none; }
            
            .etiquetas-page {
                box-shadow: none;
                page-break-after: always;
                margin: 0;
            }
            
            /* Força impressão de cores */
            .etiqueta-header { background-color: #ddd !important; }
            .status-permanente { background-color: #000 !important; color: #fff !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏷️ Impressor Otimizado (A4)</h1>
    </div>

    <div class="content">
        <div class="form-section">
            <div class="form-group">
                <label>1. Unidade:</label>
                <input type="text" id="searchInput" placeholder="Digite código ou nome..." autocomplete="off">
                <div class="search-results" id="searchResults"></div>
            </div>
            <div id="selectedUnitInfo" style="color: #667eea; font-weight: bold; margin-top: 5px;"></div>
        </div>

        <div class="form-section">
            <label style="display:block; margin-bottom:10px; font-weight:600;">2. Tipo:</label>
            <div class="tipo-grid">
                <div class="tipo-card" data-tipo="eliminacao" onclick="selecionarTipo('eliminacao')">
                    🗑️ Temporário
                </div>
                <div class="tipo-card" data-tipo="permanente" onclick="selecionarTipo('permanente')">
                    📚 Permanente
                </div>
            </div>
        </div>

        <button class="btn" id="btnGerar" onclick="gerarPreview()" disabled>Gerar Etiquetas</button>

        <div class="preview-section" id="previewSection">
            <div class="preview-controls">
                <span style="font-weight:bold;">Cópias:</span>
                <input type="number" id="numCopias" value="6" min="1" max="60" style="width: 60px; padding: 5px;">
                <button onclick="atualizarPreview()" style="padding: 5px 15px; cursor: pointer;">Atualizar</button>
                <button onclick="window.print()" style="padding: 5px 15px; cursor: pointer; background: #2d3748; color: white; border: none;">🖨️ Imprimir</button>
            </div>
            <div id="etiquetasContainer"></div>
        </div>
    </div>
</div>

<script>
    const unidades = [
        { codigo: "1", nome: "GABINETE DO PREFEITO" },
        { codigo: "1344", nome: "SEC. MUNICIPAL DE EDUCAÇÃO" },
        { codigo: "301", nome: "DEP. RECURSOS HUMANOS" },
        { codigo: "401", nome: "CONTABILIDADE" },
        { codigo: "1201", nome: "SAÚDE - ATENÇÃO BÁSICA" }
    ];

    let unidadeSelecionada = null;
    let tipoSelecionado = null;

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const btnGerar = document.getElementById('btnGerar');

    searchInput.addEventListener('input', function() {
        const termo = this.value.toLowerCase().trim();
        if (termo.length < 1) { searchResults.classList.remove('show'); return; }
        const resultados = unidades.filter(u => u.codigo.includes(termo) || u.nome.toLowerCase().includes(termo));
        
        searchResults.innerHTML = resultados.length ? resultsHTML(resultados) : '<div style="padding:10px; color:#999;">Nada encontrado</div>';
        searchResults.classList.add('show');
    });

    const resultsHTML = (list) => list.map(u => 
        `<div class="search-item" onclick="setUnit('${u.codigo}', '${u.nome}')"><b>${u.codigo}</b> - ${u.nome}</div>`
    ).join('');

    function setUnit(code, name) {
        unidadeSelecionada = { codigo: code, nome: name };
        searchInput.value = `${code} - ${name}`;
        searchResults.classList.remove('show');
        document.getElementById('selectedUnitInfo').innerText = `Selecionado: ${name}`;
        checkBtn();
    }

    function selecionarTipo(tipo) {
        tipoSelecionado = tipo;
        document.querySelectorAll('.tipo-card').forEach(c => c.classList.remove('selected'));
        document.querySelector(`[data-tipo="${tipo}"]`).classList.add('selected');
        checkBtn();
    }

    function checkBtn() { btnGerar.disabled = !(unidadeSelecionada && tipoSelecionado); }

    function gerarPreview() {
        document.getElementById('previewSection').classList.add('show');
        atualizarPreview();
        document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
    }

    function atualizarPreview() {
        const copias = parseInt(document.getElementById('numCopias').value) || 6;
        const container = document.getElementById('etiquetasContainer');
        const porPagina = 6;
        const paginas = Math.ceil(copias / porPagina);
        
        let html = '';
        for(let p=0; p<paginas; p++) {
            html += '<div class="etiquetas-page">';
            const qtd = Math.min(porPagina, copias - (p * porPagina));
            for(let i=0; i<qtd; i++) html += templateEtiqueta();
            // Preenche espaço vazio para manter layout
            for(let i=qtd; i<porPagina; i++) html += '<div style="visibility:hidden"></div>';
            html += '</div>';
        }
        container.innerHTML = html;
    }

    function templateEtiqueta() {
        const isPerm = tipoSelecionado === 'permanente';
        const footerClass = isPerm ? 'status-permanente' : 'status-eliminacao';
        const footerText = isPerm ? 'GUARDA PERMANENTE' : 'ELIMINAÇÃO: 31/12/______';
        
        return `
            <div class="etiqueta">
                <div class="etiqueta-header">
                    <div class="etiqueta-header-title">Unidade Produtora</div>
                    <div class="etiqueta-header-unit">${unidadeSelecionada.codigo} - ${unidadeSelecionada.nome}</div>
                </div>
                <div class="etiqueta-body">
                    <div class="etiqueta-row">
                        <span class="etiqueta-label">Destino:</span>
                        <span class="etiqueta-value">ARQUIVO CENTRAL</span>
                    </div>
                    <div class="etiqueta-row">
                        <span class="etiqueta-label">Assunto/Cód:</span>
                        <span class="etiqueta-value"></span>
                    </div>
                    <div class="etiqueta-row">
                        <span class="etiqueta-label">Datas:</span>
                        <span class="etiqueta-value">____/____ a ____/____</span>
                    </div>
                    <div class="etiqueta-row" style="flex:1;">
                        <span class="etiqueta-label">Descrição:</span>
                        <span class="etiqueta-value" style="border-bottom: 1px dotted #ccc;"></span>
                    </div>
                    <div class="etiqueta-row">
                        <span class="etiqueta-label">Nº CX / DOC:</span>
                        <span class="etiqueta-value"></span>
                    </div>
                </div>
                <div class="etiqueta-footer ${footerClass}">${footerText}</div>
            </div>
        `;
    }

    // Fechar busca ao clicar fora
    document.addEventListener('click', e => {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) searchResults.classList.remove('show');
    });
</script>
</body>
</html>
