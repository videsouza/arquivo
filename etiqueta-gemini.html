<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressor de Etiquetas Automático</title>
    <style>
        /* --- ESTILOS GERAIS DO SISTEMA (MANTIDOS) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .content { padding: 40px; }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }

        .form-section h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* Inputs e Formulários */
        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568; }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

        /* Resultados da Busca */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: none;
        }
        .search-results.show { display: block; }
        .search-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .search-item:hover { background: #f8f9ff; }
        .search-item-code { font-weight: 700; color: #667eea; margin-right: 10px; background: #eef2ff; padding: 2px 6px; border-radius: 4px; }

        .selected-unit {
            background: #e8f4ff;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #667eea;
            margin-top: 15px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        .selected-unit.show { display: block; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid de Tipos */
        .tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .tipo-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: white;
        }
        .tipo-card:hover { border-color: #667eea; transform: translateY(-3px); }
        .tipo-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3);
        }
        .tipo-icon { font-size: 42px; margin-bottom: 10px; }

        /* Botões */
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: #667eea; color: white; flex: 1; }
        .btn-primary:hover:not(:disabled) { background: #5a67d8; transform: translateY(-2px); }
        .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; }
        .btn-secondary { background: #718096; color: white; }
        .btn-secondary:hover { background: #4a5568; }

        /* Área de Preview */
        .preview-section {
            display: none;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid #e2e8f0;
        }
        .preview-section.show { display: block; }
        .preview-controls { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; background: #f7fafc; padding: 15px; border-radius: 8px; }

        /* --- ESTILOS DAS ETIQUETAS (DESIGN FINAL 9x9cm) --- */
        .etiquetas-page {
            background: white;
            width: 180mm; /* A4 */
            height: 270mm;
            margin: 0 auto;
            /* Margem de 15mm para centralizar a grade 18x27cm (21-18=3cm, 3/2=1.5cm) */
            padding: 15mm; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(2, 90mm);
            grid-template-rows: repeat(3, 90mm);
            gap: 0; /* Gap removido para o ajuste de margem ser feito apenas pelo padding da página */
            box-sizing: border-box;
            /* O tamanho total da grade será 180mm x 270mm. A A4 é 210mm x 297mm.
               Isso deixa 15mm de margem em volta (Top: 15mm, Bottom: 12mm, Left/Right: 15mm)
            */
        }
        
        .etiqueta {
            border: 2px solid #2d3748;
            border-radius: 8px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 90mm; /* Largura 9cm */
            height: 90mm; /* Altura 9cm */
            position: relative;
        }

        /* Cabeçalho da Etiqueta */
        .etiqueta-header {
            background-color: #f0f0f0; 
            padding: 8px 12px;
            border-bottom: 2px solid #2d3748;
            text-align: center;
        }
        
        .etiqueta-header-title {
            font-size: 9pt;
            text-transform: uppercase;
            color: #718096;
            letter-spacing: 1px;
            font-weight: 700;
        }
        
        .etiqueta-header-unit {
            font-size: 11pt;
            font-weight: 800;
            color: #1a202c;
            line-height: 1.2;
            margin-top: 4px;
        }
        .etiqueta-header-unit strong {
            font-size: 13pt; 
            margin-right: 5px;
            color: #000;
        }

        /* Corpo da Etiqueta */
        .etiqueta-body {
            padding: 10px 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .etiqueta-row {
            display: flex;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px dotted #cbd5e0; 
        }
        
        .etiqueta-row:last-child { border-bottom: none; }

        .etiqueta-label {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            color: #4a5568;
            min-width: 90px;
        }

        .etiqueta-value {
            font-size: 10pt;
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 600;
            color: #2d3748;
            flex: 1;
        }
        
        /* Área de Descrição Aprimorada */
        .descricao-box {
            border-bottom: 1px dotted #cbd5e0;
            height: 30px; 
            flex-grow: 1;
            margin-top: 5px; 
            font-size: 9pt;
            color: #2d3748;
        }

        /* Status Badge (Permanente vs Eliminação) */
        .etiqueta-footer {
            padding: 8px;
            text-align: center;
            border-top: 2px solid #2d3748;
            font-weight: bold;
            font-size: 10pt;
            text-transform: uppercase;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .status-permanente {
            background-color: #2d3748;
            color: white;
        }

        .status-eliminacao {
            background-color: #fff;
            color: #2d3748;
            position: relative;
        }
        
        /* Marca d'água sutil para eliminação */
        .status-eliminacao::after {
            content: "TEMPORÁRIO";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30pt;
            color: rgba(0,0,0,0.03); 
            pointer-events: none;
            font-weight: 900;
        }

        .cut-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            border: 1px dashed #e2e8f0; 
            margin: -2px;
            border-radius: 10px;
        }

        /* --- AJUSTES FINAIS PARA IMPRESSÃO --- */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .container { box-shadow: none; width: 100%; max-width: none; border-radius: 0; }
            .header, .form-section, .btn-group, .preview-controls, h2 { display: none !important; }
            .preview-section { display: block !important; padding: 0; border: none; margin: 0; }
            
            @page {
                size: A4;
                /* Remove as margens default da impressora para dar mais controle */
                margin: 12mm; 
            }
            
            .etiquetas-page {
                /* Centraliza a grade 180x270mm dentro da A4 210x297mm. */
                /* O padding de 15mm fará com que a grade comece 1.5cm de cima/esquerda, 
                   garantindo o alinhamento centralizado no papel A4. */
                padding: 0mm; 
                margin: 0;
                box-shadow: none;
                page-break-after: always;
                width: auto;
                height: auto;
            }

            .etiqueta {
                border-color: #000;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .etiqueta-header { background-color: #f0f0f0 !important; border-bottom-color: #000; }
            .etiqueta-footer { border-top-color: #000; }
            .status-permanente { background-color: #000 !important; color: #fff !important; }
            .cut-lines { display: none; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏷️ Impressor de Etiquetas Pro</h1>
            <p>Sistema de Gestão Documental</p>
        </div>

        <div class="content">
            <div class="form-section">
                <h2>1. Unidade Produtora</h2>
                <div class="form-group">
                    <label>🔍 Buscar Unidade:</label>
                    <input type="text" id="searchInput" placeholder="Digite o código (ex: 1344) ou nome..." autocomplete="off">
                    <div class="search-results" id="searchResults"></div>
                </div>
                <div class="selected-unit" id="selectedUnit">
                    <h3 style="margin-bottom: 5px; color: #667eea;">Unidade Selecionada:</h3>
                    <div id="selectedUnitText" style="font-size: 1.1em; color: #2d3748;"></div>
                </div>
            </div>

            <div class="form-section">
                <h2>2. Tipo de Etiqueta</h2>
                <div class="tipo-grid">
                    <div class="tipo-card" data-tipo="eliminacao" onclick="selecionarTipo('eliminacao')">
                        <div class="tipo-icon">🗑️</div>
                        <div style="font-weight: bold; font-size: 1.1em; margin-bottom: 5px;">Eliminação</div>
                        <div style="color: #718096; font-size: 0.9em;">Documentos temporários com data de eliminação.</div>
                    </div>
                    
                    <div class="tipo-card" data-tipo="permanente" onclick="selecionarTipo('permanente')">
                        <div class="tipo-icon">🏛️</div>
                        <div style="font-weight: bold; font-size: 1.1em; margin-bottom: 5px;">Guarda Permanente</div>
                        <div style="color: #718096; font-size: 0.9em;">Documentos históricos e probatórios.</div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnGerar" onclick="gerarPreview()" disabled>
                    📄 Gerar Etiquetas
                </button>
            </div>

            <div class="preview-section" id="previewSection">
                <div class="preview-controls">
                    <div style="flex: 1;">
                        <label style="font-weight: bold; margin-right: 10px;">Cópias:</label>
                        <input type="number" id="numCopias" value="6" min="1" max="60" style="width: 80px; padding: 5px;">
                    </div>
                    <button class="btn btn-secondary" onclick="atualizarPreview()">🔄 Atualizar</button>
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir</button>
                    <button class="btn btn-secondary" style="background: #e53e3e;" onclick="fecharPreview()">✕</button>
                </div>
                <div id="etiquetasContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DADOS ---
        const unidades = [
            { codigo: "1", nome: "GABINETE DO PREFEITO" },
            { codigo: "2", nome: "SECRETARIA MUNICIPAL DE GOVERNO" },
            { codigo: "3", nome: "SECRETARIA MUNICIPAL DE ADMINISTRAÇÃO" },
            { codigo: "4", nome: "SECRETARIA MUNICIPAL DE FINANÇAS" },
            { codigo: "11", nome: "SECRETARIA MUNICIPAL DE EDUCAÇÃO" },
            { codigo: "12", nome: "SECRETARIA MUNICIPAL DE SAÚDE" },
            { codigo: "1344", nome: "SEC. MUNICIPAL DE EDUCAÇÃO" },
            { codigo: "301", nome: "RH - RECURSOS HUMANOS" },
            { codigo: "401", nome: "CONTABILIDADE E TESOURARIA" }
        ];

        let unidadeSelecionada = null;
        let tipoSelecionado = null;

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const selectedUnit = document.getElementById('selectedUnit');
        const btnGerar = document.getElementById('btnGerar');

        // Lógica de Busca
        searchInput.addEventListener('input', function() {
            const termo = this.value.toLowerCase().trim();
            if (termo.length < 1) { searchResults.classList.remove('show'); return; }

            const resultados = unidades.filter(u => u.codigo.includes(termo) || u.nome.toLowerCase().includes(termo));

            if (resultados.length > 0) {
                searchResults.innerHTML = resultados.map(u => `
                    <div class="search-item" onclick="selecionarUnidade('${u.codigo}', '${u.nome}')">
                        <span class="search-item-code">${u.codigo}</span>
                        <span class="search-item-name">${u.nome}</span>
                    </div>
                `).join('');
                searchResults.classList.add('show');
            } else {
                searchResults.innerHTML = '<div style="padding:15px; color:#999;">Nenhuma unidade encontrada</div>';
                searchResults.classList.add('show');
            }
        });

        function selecionarUnidade(codigo, nome) {
            unidadeSelecionada = { codigo, nome };
            searchInput.value = `${codigo} - ${nome}`;
            searchResults.classList.remove('show');
            document.getElementById('selectedUnitText').innerHTML = `<strong>${codigo}</strong> - ${nome}`;
            selectedUnit.classList.add('show');
            verificarBotao();
        }

        function selecionarTipo(tipo) {
            tipoSelecionado = tipo;
            document.querySelectorAll('.tipo-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-tipo="${tipo}"]`).classList.add('selected');
            verificarBotao();
        }

        function verificarBotao() {
            btnGerar.disabled = !(unidadeSelecionada && tipoSelecionado);
        }

        function gerarPreview() {
            document.getElementById('previewSection').classList.add('show');
            atualizarPreview();
            document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
        }

        function fecharPreview() {
            document.getElementById('previewSection').classList.remove('show');
        }

        function atualizarPreview() {
            const numCopias = parseInt(document.getElementById('numCopias').value) || 6;
            const container = document.getElementById('etiquetasContainer');
            const etiquetasPorPagina = 6;
            const numPaginas = Math.ceil(numCopias / etiquetasPorPagina);
            
            let html = '';
            
            for (let pagina = 0; pagina < numPaginas; pagina++) {
                html += '<div class="etiquetas-page">';
                const qtdNestaPagina = Math.min(etiquetasPorPagina, numCopias - (pagina * etiquetasPorPagina));
                
                for (let i = 0; i < qtdNestaPagina; i++) {
                    html += gerarEtiquetaHTML();
                }
                // Preencher com vazios para manter o grid
                for (let i = qtdNestaPagina; i < etiquetasPorPagina; i++) {
                     html += '<div style="visibility: hidden;"></div>';
                }
                html += '</div>';
            }
            container.innerHTML = html;
        }

        // --- HTML DA ETIQUETA FINAL ---
        function gerarEtiquetaHTML() {
            if (!unidadeSelecionada || !tipoSelecionado) return '';

            const isPerm = tipoSelecionado === 'permanente';
            const footerClass = isPerm ? 'status-permanente' : 'status-eliminacao';
            // Ajuste no placeholder
            const footerText = isPerm ? 'GUARDA PERMANENTE' : `ELIMINAÇÃO: 31/12/ _ _ _ _`; 
            
            const unidadeCodigo = unidadeSelecionada.codigo;
            const unidadeNome = unidadeSelecionada.nome;

            return `
                <div class="etiqueta">
                    <div class="cut-lines"></div>
                    
                    <div class="etiqueta-header">
                        <div class="etiqueta-header-title">Unidade Produtora / Portadora</div>
                        <div class="etiqueta-header-unit">
                            <strong>${unidadeCodigo}</strong> - ${unidadeNome}
                        </div>
                    </div>

                    <div class="etiqueta-body">
                        <div class="etiqueta-row">
                            <span class="etiqueta-label">Destinatário:</span>
                            <span class="etiqueta-value">1344- SECRET. DE EDUCAÇÃO</span>
                        </div>

                        <div class="etiqueta-row" style="padding-bottom: 0;">
                            <span class="etiqueta-label">Código:</span>
                            <span class="etiqueta-value" style="flex: 1;"></span>
                            <span class="etiqueta-label" style="min-width: 50px; margin-right: 5px;">Data:</span>
                            <span class="etiqueta-value" style="flex: 0 0 100px;">___/___/____</span>
                        </div>
                        
                        <div class="etiqueta-row">
                            <span class="etiqueta-label">Tipo Doc.:</span>
                            <span class="etiqueta-value"></span>
                        </div>
                        
                        <div class="etiqueta-row" style="flex-direction: column; align-items: flex-start; padding: 6px 0 15px 0;">
                            <span class="etiqueta-label">Descrição:</span>
                            <div class="descricao-box"></div>
                        </div>

                        <div class="etiqueta-row">
                            <span class="etiqueta-label">Nº Documento:</span>
                            <span class="etiqueta-value">S/N: _ _ _ _ _ _</span>
                        </div>
                    </div>

                    <div class="etiqueta-footer ${footerClass}">
                        ${footerText}
                    </div>
                </div>
            `;
        }

        // Fechar dropdown se clicar fora
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.remove('show');
            }
        });
        
        // Inicializa o botão
        verificarBotao();
    </script>
</body>
</html>
