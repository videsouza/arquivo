<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Arquivo + Gerador de Etiquetas</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* --- ESTILOS GERAIS (INTERFACE WEB) --- */
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* Classes para esconder elementos na impressão */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .print-area { display: block !important; }
        }

        .container {
            max-width: 1200px; margin: 0 auto; background: white;
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 40px; text-align: center;
        }
        .header h1 { margin: 0; font-size: 28px; }

        .content { padding: 30px; }

        /* Upload */
        .upload-area {
            border: 3px dashed #cbd5e0; border-radius: 15px; padding: 40px;
            text-align: center; cursor: pointer; transition: 0.3s;
            background: #f8f9fa;
        }
        .upload-area:hover { border-color: #667eea; background: #eef2ff; }
        .btn-primary {
            background: #667eea; color: white; border: none; padding: 10px 25px;
            border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px;
        }

        /* Navegação */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn {
            padding: 10px 20px; border: 1px solid #ddd; background: #f8f9fa;
            border-radius: 20px; cursor: pointer; font-weight: 600;
        }
        .tab-btn.active { background: #667eea; color: white; border-color: #667eea; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Dashboard Simples */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; border-left: 5px solid #667eea; }
        .kpi-val { font-size: 24px; font-weight: bold; color: #333; }

        /* --- ESTILOS DAS ETIQUETAS (O DESIGN QUE VOCÊ GOSTOU) --- */
        .print-area {
            display: none; /* Escondido na tela normal, aparece na aba e impressão */
        }

        /* Configuração A4 */
        .page {
            width: 210mm; height: 297mm;
            background: white; margin: 0 auto;
            display: flex; flex-wrap: wrap;
            page-break-after: always;
            box-shadow: 0 0 10px rgba(0,0,0,0.2); /* Sombra só na tela */
            margin-bottom: 20px;
        }

        @media print {
            @page { size: A4; margin: 0mm; }
            .page { box-shadow: none; margin: 0; }
        }

        .etiqueta {
            width: 50%; height: 99mm; /* 1/3 da folha exato */
            border: 1px solid #333; /* Borda externa */
            box-sizing: border-box;
            display: flex; flex-direction: column;
            position: relative;
            background: white;
        }

        /* Linhas de corte pontilhadas internas */
        .etiqueta::after {
            content: ''; position: absolute; right: 0; bottom: 0;
            width: 100%; height: 100%; pointer-events: none;
            border-right: 1px dashed #ccc; border-bottom: 1px dashed #ccc;
        }

        /* O Estilo "Visual Clean/Cartão" do primeiro código */
        .etiqueta-header {
            background: #667eea; /* Aquele roxo bonito */
            color: white; padding: 10px; text-align: center;
            border-bottom: 2px solid #333;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        
        .etiqueta-header-title { font-size: 8pt; text-transform: uppercase; opacity: 0.9; }
        .etiqueta-header-unit { font-size: 11pt; font-weight: 800; margin-top: 2px; text-transform: uppercase; }

        .etiqueta-body {
            padding: 10px 15px; flex: 1; display: flex; flex-direction: column; justify-content: space-between;
        }

        .etiqueta-row {
            display: flex; align-items: baseline; padding: 4px 0;
            border-bottom: 1px dotted #999; /* A linha pontilhada que você gostou */
        }
        .etiqueta-row:last-child { border-bottom: none; }

        .etiqueta-label { font-size: 9pt; font-weight: 700; color: #555; min-width: 90px; }
        .etiqueta-value { font-size: 11pt; font-family: 'Courier New', monospace; font-weight: 600; color: #000; }

        .etiqueta-footer {
            padding: 8px; text-align: center; font-weight: 800; font-size: 10pt;
            text-transform: uppercase; border-top: 2px solid #333;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        
        .status-perm { background: #333; color: white; }
        .status-elim { background: white; color: #333; }

        #loading { display: none; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="container no-print">
        <div class="header">
            <h1>🚀 Hub & Impressor</h1>
            <p>Carregue o Excel e gere as etiquetas automaticamente</p>
        </div>

        <div class="content">
            <div id="uploadSection" class="upload-area">
                <div style="font-size: 40px;">📂</div>
                <h3>Arraste seu arquivo Excel aqui</h3>
                <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Selecionar Arquivo</button>
            </div>

            <div id="loading">Processando...</div>

            <div id="mainPanel" style="display: none;">
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('dashboard', this)">📊 Dashboard</button>
                    <button class="tab-btn" onclick="showTab('etiquetas', this)">🖨️ Imprimir Etiquetas</button>
                    <button class="tab-btn" onclick="location.reload()" style="color:red; border-color:red;">✖️ Sair</button>
                </div>

                <div id="dashboard" class="tab-content active">
                    <div class="kpi-grid" id="kpiGrid"></div>
                    <div style="background: #f4f4f4; padding: 20px; border-radius: 10px;">
                        <h3>Top 5 Códigos</h3>
                        <canvas id="chart1" style="max-height: 300px;"></canvas>
                    </div>
                </div>

                <div id="etiquetas" class="tab-content">
                    <div style="text-align: center; margin-bottom: 20px; padding: 20px; background: #e6fffa; border: 1px solid #4fd1c5; border-radius: 8px;">
                        <h3 style="margin:0; color: #234e52;">Visualização de Impressão</h3>
                        <p style="margin: 5px 0 15px 0;">Foram geradas etiquetas para todas as linhas do Excel.</p>
                        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir Agora</button>
                        <br><small style="color: #d53f8c;">*Lembre-se: Margens "Nenhuma" na impressora.</small>
                    </div>
                    <div id="previewArea"></div> 
                </div>

            </div>
        </div>
    </div>

    <div id="printableContainer" class="print-area"></div>

    <script>
        // --- LÓGICA ---
        let rawData = [];

        // Upload
        const dropZone = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#eef2ff'; });
        dropZone.addEventListener('dragleave', () => dropZone.style.background = '#f8f9fa');
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if(e.dataTransfer.files.length) processarExcel(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) processarExcel(e.target.files[0]);
        });

        function processarExcel(file) {
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                rawData = [];
                // Lê todas as abas
                workbook.SheetNames.forEach(name => {
                    const sheet = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                    rawData = [...rawData, ...sheet];
                });

                // Renderiza
                renderDashboard(rawData);
                renderEtiquetas(rawData);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        }

        // --- RENDERIZAÇÃO DO DASHBOARD ---
        function renderDashboard(data) {
            const total = data.length;
            const setores = [...new Set(data.map(d => d.SETOR))];
            const status = [...new Set(data.map(d => d.STATUS))];

            // KPIs
            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card">
                    <div style="font-size:12px; text-transform:uppercase; color:#666;">Registros</div>
                    <div class="kpi-val">${total}</div>
                </div>
                <div class="kpi-card" style="border-left-color: #48bb78;">
                    <div style="font-size:12px; text-transform:uppercase; color:#666;">Setores</div>
                    <div class="kpi-val">${setores.length}</div>
                </div>
                <div class="kpi-card" style="border-left-color: #ed8936;">
                    <div style="font-size:12px; text-transform:uppercase; color:#666;">Status Únicos</div>
                    <div class="kpi-val">${status.length}</div>
                </div>
            `;

            // Gráfico Simples
            const codCounts = {};
            data.forEach(d => codCounts[d.COD] = (codCounts[d.COD] || 0) + 1);
            const sortedCods = Object.entries(codCounts).sort((a,b) => b[1] - a[1]).slice(0,5);

            new Chart(document.getElementById('chart1'), {
                type: 'bar',
                data: {
                    labels: sortedCods.map(i => i[0]),
                    datasets: [{ label: 'Qtd', data: sortedCods.map(i => i[1]), backgroundColor: '#667eea' }]
                }
            });
        }

        // --- RENDERIZAÇÃO DAS ETIQUETAS (O GRANDE TRUQUE) ---
        function renderEtiquetas(data) {
            const container = document.getElementById('printableContainer');
            const preview = document.getElementById('previewArea'); // Para mostrar na tela tbm
            
            const porPagina = 6;
            const paginas = Math.ceil(data.length / porPagina);
            let html = '';

            for(let p=0; p<paginas; p++) {
                html += '<div class="page">';
                
                // Pega 6 registros ou o que sobrar
                const slice = data.slice(p*porPagina, (p*porPagina) + porPagina);
                
                slice.forEach(reg => {
                    // Lógica para determinar status (Permanente ou Eliminação)
                    // Procura palavras chaves no Excel, se não achar, padroniza.
                    let stText = reg.STATUS || "EM ANÁLISE";
                    let isPerm = stText.toUpperCase().includes("PERMANENTE");
                    let footerClass = isPerm ? "status-perm" : "status-elim";
                    let footerContent = isPerm ? "GUARDA PERMANENTE" : `ELIMINAÇÃO: ${reg.DATA_ELIM || "31/12/____"}`;

                    html += `
                        <div class="etiqueta">
                            <div class="etiqueta-header">
                                <div class="etiqueta-header-title">Unidade Produtora</div>
                                <div class="etiqueta-header-unit">${reg.SETOR || "NÃO INFORMADO"}</div>
                            </div>
                            <div class="etiqueta-body">
                                <div class="etiqueta-row">
                                    <span class="etiqueta-label">Destinatário:</span>
                                    <span class="etiqueta-value">ARQUIVO GERAL</span>
                                </div>
                                <div class="etiqueta-row">
                                    <span class="etiqueta-label">Código:</span>
                                    <span class="etiqueta-value">${reg.COD || ""}</span>
                                </div>
                                <div class="etiqueta-row">
                                    <span class="etiqueta-label">Tipo Doc:</span>
                                    <span class="etiqueta-value">${reg.TIPO || ""}</span>
                                </div>
                                <div class="etiqueta-row" style="flex:1; align-items:flex-start;">
                                    <span class="etiqueta-label">Descrição:</span>
                                    <span class="etiqueta-value" style="font-size: 10pt;">${reg.DESCRICAO || reg.OBS || ""}</span>
                                </div>
                                <div class="etiqueta-row">
                                    <span class="etiqueta-label">Data/Ref:</span>
                                    <span class="etiqueta-value">${reg.DATA || "___/___/____"}</span>
                                </div>
                            </div>
                            <div class="etiqueta-footer ${footerClass}">
                                ${footerContent}
                            </div>
                        </div>
                    `;
                });

                // Preenche espaços vazios para manter layout se a página não estiver cheia
                const faltam = porPagina - slice.length;
                for(let i=0; i<faltam; i++) {
                    html += '<div class="etiqueta" style="border:none;"></div>';
                }

                html += '</div>'; // Fecha page
            }

            container.innerHTML = html;
            
            // Clona para o preview (visualização na aba)
            // Usamos zoom css para caber na tela
            preview.innerHTML = html;
            preview.style.transform = "scale(0.8)";
            preview.style.transformOrigin = "top center";
        }

        // --- NAVEGAÇÃO ---
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            
            // Truque: Se for aba etiquetas, mostra o container de impressão na tela também (hack visual)
            if(id === 'etiquetas') {
                document.getElementById('printableContainer').style.display = 'none'; // Só aparece no print real
            }
        }
    </script>
</body>
</html>
