<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validador de Planilha de Eliminação – Versão Final</title>

<!-- Fonte moderna -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.111/pdf.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #f5f7fa;
        color: #222;
    }

    header {
        background: #005f99;
        color: white;
        padding: 22px 30px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 5px rgba(0,0,0,.15);
    }

    main {
        padding: 25px 30px;
        max-width: 1400px;
        margin: auto;
    }

    .card {
        background: white;
        padding: 24px;
        margin: 18px 0;
        border-radius: 14px;
        box-shadow: 0 3px 12px rgba(0,0,0,.08);
        border: 1px solid #e4e4e4;
    }

    .titulo-card {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #005f99;
    }

    input[type="file"] {
        padding: 12px;
        background: #eef3f8;
        border-radius: 8px;
        border: 1px solid #ccc;
        cursor: pointer;
    }

    #loading {
        padding: 12px 20px;
        background: #ffcc00;
        border-radius: 8px;
        font-weight: 600;
        margin-top: 10px;
        display: none;
    }

    #dashboard {
        display: none;
        margin-top: 20px;
    }

    .grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
    }

    .dash-item {
        background: #ffffff;
        border-left: 6px solid #005f99;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0,0,0,.07);
    }

    .dash-num {
        font-size: 32px;
        font-weight: 700;
        color: #004d80;
    }

    .dash-label {
        margin-top: 4px;
        font-size: 15px;
        color: #555;
    }

    #log {
        white-space: pre-wrap;
        font-family: monospace;
        background: #111;
        color: #0f0;
        padding: 20px;
        border-radius: 10px;
        height: 250px;
        overflow-y: auto;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>
    Validador de Planilha de Eliminação (Versão Final Profissional)
</header>

<main>

<!-- Regras -->
<div class="card">
    <div class="titulo-card">1) Carregar tabela de regras (Excel)</div>
    <input type="file" id="fileRegras" accept=".xlsx">
</div>

<!-- PDF -->
<div class="card">
    <div class="titulo-card">2) Carregar PDF de eliminação</div>
    <input type="file" id="filePDF" accept=".pdf">
    <div id="loading">⏳ Lendo PDF... <span id="loadingInfo"></span></div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="card">
    <div class="titulo-card">3) Resultados da Validação</div>

    <div class="grid-3">
        <div class="dash-item">
            <div class="dash-num" id="dashTotal">0</div>
            <div class="dash-label">Registros encontrados</div>
        </div>

        <div class="dash-item">
            <div class="dash-num" id="dashErros">0</div>
            <div class="dash-label">Erros identificados</div>
        </div>

        <div class="dash-item">
            <div class="dash-num" id="dashOK">0</div>
            <div class="dash-label">Registros corretos</div>
        </div>
    </div>
</div>

<!-- Log -->
<div class="card">
    <div class="titulo-card">Log do Sistema</div>
    <div id="log">Aguardando ações...</div>
</div>

</main>


<script>
/* ==========================================================
   UTIL: LOG
========================================================== */
function log(msg) {
    const box = document.getElementById("log");
    box.textContent += "\n" + msg;
    box.scrollTop = box.scrollHeight;
}

/* ==========================================================
   1) LER REGRAS (Excel)
========================================================== */

let REGRAS_MAP = new Map();

document.getElementById("fileRegras").addEventListener("change", async function() {
    const file = this.files[0];
    if (!file) return;

    log("📘 Lendo regras: " + file.name);

    const ar = await file.arrayBuffer();
    const wb = XLSX.read(ar, { type: "array" });

    const sheet = wb.Sheets[wb.SheetNames[0]];
    const dados = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    REGRAS_MAP.clear();

    for (let r of dados) {
        REGRAS_MAP.set(String(r.cod).trim(), {
            min: parseInt(r.min),
            max: parseInt(r.max)
        });
    }

    log("✔ Regras carregadas: " + REGRAS_MAP.size);
});

/* ==========================================================
   2) EXTRAÇÃO DO PDF – TEXTO LINEAR (ESTILO pdfplumber)
========================================================== */

async function extrairTextoLinearDoPDF(pdf) {
    const linhas = [];

    for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const textContent = await page.getTextContent();

        let linha = "";
        let lastY = null;

        for (const item of textContent.items) {
            const y = item.transform[5];
            const str = item.str || "";

            if (lastY === null) lastY = y;

            if (Math.abs(y - lastY) > 5) {
                if (linha.trim()) linhas.push(linha.trim());
                linha = str;
                lastY = y;
            } else {
                linha += " " + str;
            }
        }

        if (linha.trim()) linhas.push(linha.trim());
    }

    return linhas;
}

/* ==========================================================
   3) PARSER IGUAL AO PYTHON
========================================================== */

function interpretarLinhasComoPython(linhas) {
    const registros = [];
    const regexCodigo = /^(\d\.\d\.\d{2}\.\d{2}\.\d{2})\s+/;

    for (let linha of linhas) {
        const m = linha.match(regexCodigo);
        if (!m) continue;

        const codigo = m[1];
        const partes = linha.split(/\s+/);
        const anos = partes.filter(x => /^\d{4}$/.test(x));

        let data_ini="", data_fim="", elim_ini="", elim_fim="", obs="";

        if (anos.length >= 2) {
            const up = linha.toUpperCase();

            if (up.includes("ATÉ")) {
                data_ini = anos[0];
                data_fim = anos[1];

                if (anos.length >= 4) {
                    elim_ini = anos[2];
                    elim_fim = anos[3];
                } else if (anos.length >= 3) {
                    elim_ini = anos[2];
                    elim_fim = anos[2];
                }

            } else {
                data_ini = anos[0];
                data_fim = anos[0];
                if (anos.length >= 2) {
                    elim_ini = anos[1];
                    elim_fim = anos[1];
                }
            }
        }

        const obsMatch = linha.match(/(SE -.*|EMEI.*|EMEF.*|IMI.*|NEI.*|CECOI.*|CENTRO.*|SECRETARIA.*)/);
        if (obsMatch) obs = obsMatch[1].trim();

        if (elim_ini && elim_fim) {
            registros.push({
                cod: codigo,
                espec_from_pdf: obs,
                anosLimite: [parseInt(data_ini), parseInt(data_fim)],
                anosElimPDF: [parseInt(elim_ini), parseInt(elim_fim)],
                raw: linha
            });
        }
    }

    return registros;
}

/* ==========================================================
   4) VALIDAÇÃO
========================================================== */

function analisarErros(registros) {
    let erros = 0;
    let ok = 0;

    for (let r of registros) {
        const regra = REGRAS_MAP.get(r.cod);

        if (!regra) {
            erros++;
            log("❌ Código SEM regra: " + r.cod);
            continue;
        }

        const [elimIni, elimFim] = r.anosElimPDF;

        if (elimIni < regra.min || elimFim > regra.max) {
            erros++;
            log(`⚠ Erro ${r.cod} → (${elimIni}–${elimFim}) fora do permitido ${regra.min}–${regra.max}`);
        } else {
            ok++;
        }
    }

    document.getElementById("dashboard").style.display = "block";
    document.getElementById("dashTotal").textContent = registros.length;
    document.getElementById("dashErros").textContent = erros;
    document.getElementById("dashOK").textContent = ok;
}

/* ==========================================================
   5) PROCESSAR PDF
========================================================== */

document.getElementById("filePDF").addEventListener("change", async function() {
    if (!REGRAS_MAP.size) {
        alert("Carregue primeiro a planilha de regras.");
        return;
    }

    const file = this.files[0];
    if (!file) return;

    document.getElementById("loading").style.display = "block";
    document.getElementById("loadingInfo").textContent = file.name;

    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;

    log("📄 Lendo PDF: " + file.name);

    const linhas = await extrairTextoLinearDoPDF(pdf);
    log("✔ Linhas extraídas: " + linhas.length);

    const registros = interpretarLinhasComoPython(linhas);
    log("✔ Registros identificados: " + registros.length);

    analisarErros(registros);

    document.getElementById("loading").style.display = "none";
});
</script>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</body>
</html>
