<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Etiquetas de Triagem - ARQUIVO / SEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gov-blue: #1351b4;
            --bg-color: #f4f4f4;
            --text-color: #333;
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Cabeçalho e Rodapé */
        .header, .footer {
            background-color: var(--gov-blue);
            color: #ffffff;
            padding: 15px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .footer {
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* Layout Principal */
        .container {
            display: flex;
            gap: 30px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* Painel de Controle (Formulário) */
        .painel-controle {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 0 0 400px;
            height: fit-content;
        }

        .painel-controle h2 {
            margin-bottom: 20px;
            color: var(--gov-blue);
            font-size: 1.2rem;
            border-bottom: 2px solid var(--gov-blue);
            padding-bottom: 5px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: var(--font-family);
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .botoes-acao {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-add { background-color: #28a745; color: white; }
        .btn-add:hover { background-color: #218838; }

        .btn-print { background-color: var(--gov-blue); color: white; }
        .btn-print:hover { background-color: #0f4090; }

        .btn-clear { background-color: #dc3545; color: white; }
        .btn-clear:hover { background-color: #c82333; }

        /* Área de Visualização na Tela */
        .area-preview {
            flex: 1;
            background: #fff;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-y: auto;
            max-height: calc(100vh - 160px);
        }

        .grid-etiquetas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px; 
        }

        /* Estrutura da Etiqueta 100% em Tabela (Grades Visíveis) */
        .etiqueta {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .tabela-etiqueta {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            border: 2px solid #000; /* Borda externa um pouco mais grossa para destacar a etiqueta */
        }

        .tabela-etiqueta td {
            border: 1px solid #000; /* As grades internas separando todos os campos */
            padding: 3px 5px;
            vertical-align: top;
            font-size: 11px;
        }

        .tabela-etiqueta .rotulo {
            font-weight: bold;
            width: 35%;
            white-space: nowrap;
        }

        .tabela-etiqueta .caixa-descricao {
            height: 100%; /* Faz o campo de descrição expandir e empurrar o resto */
        }

        /* Container interno para dividir Quantidade e Eliminação sem quebrar a tabela */
        .celula-dupla {
            padding: 0 !important; 
        }

        .container-metades {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .coluna-metade {
            flex: 1;
            padding: 3px 5px;
        }

        .coluna-metade:first-child {
            border-right: 1px solid #000;
        }

        /* Configurações rigorosas de Impressão (A4) */
        @media print {
            @page {
                size: A4 portrait;
                margin: 10mm;
            }

            .no-print {
                display: none !important;
            }
            
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }

            .container {
                padding: 0;
                margin: 0;
                max-width: 100%;
                display: block;
            }

            .area-preview {
                padding: 0;
                box-shadow: none;
                max-height: none;
                overflow: visible;
            }

            .grid-etiquetas {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-auto-rows: 88mm; /* Mantém as 6 etiquetas certinhas no A4 */
                gap: 5mm; 
            }

            .etiqueta {
                page-break-inside: avoid;
                overflow: hidden; 
            }
        }
    </style>
</head>
<body>

    <header class="header no-print">
        <h1>ARQUIVO / SEC</h1>
    </header>

    <main class="container">
        <section class="painel-controle no-print">
            <h2>Dados da Triagem</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="doc">Nº DOCUMENTO</label>
                    <input type="text" id="doc" value="S/N">
                </div>
                <div class="form-group">
                    <label for="data">Data</label>
                    <input type="text" id="data" placeholder="DD/MM/AAAA">
                </div>
            </div>

            <div class="form-group">
                <label for="portador">Portador/Produtor</label>
                <input type="text" id="portador">
            </div>

            <div class="form-group">
                <label for="destinatario">Destinatário</label>
                <input type="text" id="destinatario" value="1344 – SEC. MUNICIPAL DE EDUCAÇÃO">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo">
                </div>
                <div class="form-group">
                    <label for="situacao">Sit. Doc.</label>
                    <input type="text" id="situacao" value="AGUARDANDO PLANILHA">
                </div>
            </div>

            <div class="form-group">
                <label for="tipo">Tipo</label>
                <input type="text" id="tipo">
            </div>

            <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" placeholder="Detalhes do conteúdo..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="text" id="quantidade" placeholder="______ cm">
                </div>
                <div class="form-group">
                    <label for="eliminacao">Eliminação</label>
                    <input type="text" id="eliminacao" placeholder="30/12/_______">
                </div>
            </div>

            <div class="botoes-acao">
                <button class="btn btn-add" onclick="adicionarEtiqueta()">+ Adicionar</button>
                <button class="btn btn-clear" onclick="limparEtiquetas()">Limpar</button>
                <button class="btn btn-print" onclick="window.print()">Imprimir</button>
            </div>
        </section>

        <section class="area-preview">
            <div class="grid-etiquetas" id="grid-render">
                </div>
        </section>
    </main>

    <footer class="footer no-print">
        Desenvolvido por Vinicius A. de Souza
    </footer>

    <script>
        function adicionarEtiqueta() {
            const doc = document.getElementById('doc').value || 'S/N';
            const data = document.getElementById('data').value || '___/___/______';
            const portador = document.getElementById('portador').value || '';
            const destinatario = document.getElementById('destinatario').value || '';
            const codigo = document.getElementById('codigo').value || '';
            const situacao = document.getElementById('situacao').value || '';
            const tipo = document.getElementById('tipo').value || '';
            const descricao = document.getElementById('descricao').value || '';
            const quantidade = document.getElementById('quantidade').value || '______ cm';
            const eliminacao = document.getElementById('eliminacao').value || '___/___/_______';

            // Agora a etiqueta é gerada como uma Tabela Completa com grades (bordas)
            const etiquetaHTML = `
                <div class="etiqueta">
                    <table class="tabela-etiqueta">
                        <tr>
                            <td class="rotulo">Nº DOCUMENTO:</td>
                            <td>${doc}</td>
                        </tr>
                        <tr>
                            <td class="rotulo">Data:</td>
                            <td>${data}</td>
                        </tr>
                        <tr>
                            <td class="rotulo">Portador/Produtor:</td>
                            <td>${portador}</td>
                        </tr>
                        <tr>
                            <td class="rotulo">Destinatário:</td>
                            <td>${destinatario}</td>
                        </tr>
                        <tr>
                            <td class="rotulo">Código:</td>
                            <td>${codigo}</td>
                        </tr>
                        <tr>
                            <td class="rotulo">Sit. Doc.:</td>
                            <td>${situacao}</td>
                        </tr>
                        <tr>
                            <td class="rotulo">Tipo:</td>
                            <td>${tipo}</td>
                        </tr>
                        <tr>
                            <td colspan="2" style="border-bottom: none;"><strong>Descrição</strong></td>
                        </tr>
                        <tr>
                            <td colspan="2" class="caixa-descricao" style="border-top: none;">${descricao}</td>
                        </tr>
                        <tr>
                            <td colspan="2" class="celula-dupla">
                                <div class="container-metades">
                                    <div class="coluna-metade">
                                        <strong>Quantidade</strong><br>${quantidade}
                                    </div>
                                    <div class="coluna-metade">
                                        <strong>Eliminação</strong><br>${eliminacao}
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            `;

            document.getElementById('grid-render').insertAdjacentHTML('beforeend', etiquetaHTML);
            
            document.getElementById('descricao').value = '';
            document.getElementById('tipo').value = '';
            document.getElementById('codigo').value = '';
        }

        function limparEtiquetas() {
            if(confirm('Tem certeza que deseja apagar todas as etiquetas geradas?')) {
                document.getElementById('grid-render').innerHTML = '';
            }
        }
    </script>
</body>
</html>
