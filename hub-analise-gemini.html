<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Análise de Arquivo - Visual Clean</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* --- ESTILOS IDÊNTICOS AO PRIMEIRO CÓDIGO --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { opacity: 0.9; font-size: 18px; }

        .content { padding: 40px; }

        /* --- SEÇÕES (Estilo Card) --- */
        .section-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
        }

        .section-title {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* --- ÁREA DE UPLOAD --- */
        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .upload-icon { font-size: 48px; margin-bottom: 15px; color: #667eea; }
        
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }

        /* --- NAVEGAÇÃO (TABS) --- */
        .tabs-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #555;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover { border-color: #667eea; background: #f8f9ff; }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- METRICS (CARDS COLORIDOS) --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 5px solid #667eea;
            transition: transform 0.3s;
        }
        .metric-card:hover { transform: translateY(-3px); }
        
        .metric-value { font-size: 32px; font-weight: 700; color: #333; }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* --- GRÁFICOS --- */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }
        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* --- TABELAS --- */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        
        table { width: 100%; border-collapse: collapse; }
        
        th {
            background: #f1f5f9;
            color: #475569;
            font-weight: 700;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
            color: #333;
        }
        
        tr:hover { background: #f8f9ff; }

        /* --- LOADING --- */
        .loading-overlay {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Ocultar resultados inicialmente */
        #resultsSection { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📊 Hub de Análise de Arquivo</h1>
            <p>Importe seus dados e visualize insights instantâneos</p>
        </div>

        <div class="content">
            
            <div id="uploadSection" class="section-card">
                <h2 class="section-title">1️⃣ Importar Arquivo</h2>
                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">📂</div>
                    <h3 style="margin-bottom: 10px;">Arraste seu Excel aqui</h3>
                    <p style="color: #666; margin-bottom: 20px;">Aceita arquivos .xlsx e .xls</p>
                    <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
                    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                        Selecionar Arquivo
                    </button>
                </div>
            </div>

            <div id="loadingSection" class="loading-overlay">
                <div class="spinner"></div>
                <h3>Processando Inteligência de Dados...</h3>
            </div>

            <div id="resultsSection">
                
                <div class="tabs-container">
                    <button class="tab-btn active" onclick="switchTab('dashboard', this)">
                        <span>📈</span> Dashboard
                    </button>
                    <button class="tab-btn" onclick="switchTab('insights', this)">
                        <span>💡</span> Insights
                    </button>
                    <button class="tab-btn" onclick="switchTab('tabelas', this)">
                        <span>📋</span> Tabelas Detalhadas
                    </button>
                    <button class="tab-btn" onclick="location.reload()" style="color: #e53e3e; border-color: #fed7d7;">
                        <span>✖️</span> Novo Arquivo
                    </button>
                </div>

                <div id="dashboard" class="tab-content active">
                    <div class="metrics-grid" id="kpiGrid">
                        </div>

                    <div class="section-card">
                        <h2 class="section-title">Visualização Gráfica</h2>
                        <div class="charts-grid">
                            <div class="chart-box">
                                <h3 style="text-align:center; margin-bottom:15px; font-size:16px;">Distribuição por Status</h3>
                                <canvas id="chartStatus"></canvas>
                            </div>
                            <div class="chart-box">
                                <h3 style="text-align:center; margin-bottom:15px; font-size:16px;">Top 5 Códigos</h3>
                                <canvas id="chartCodigos"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="insights" class="tab-content">
                    <div class="section-card">
                        <h2 class="section-title">🔍 Análise Automática</h2>
                        <div id="insightsList" style="display: grid; gap: 15px;">
                            </div>
                    </div>
                </div>

                <div id="tabelas" class="tab-content">
                    <div id="tablesContainer">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DO SISTEMA ---
        let dadosGlobais = null;
        let chartInstances = {}; // Para destruir gráficos antigos antes de recriar

        // Eventos de Upload
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#764ba2'; dropZone.style.background = '#eef2ff'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#cbd5e0'; dropZone.style.background = 'white'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e0'; dropZone.style.background = 'white';
            if(e.dataTransfer.files.length) processarArquivo(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) processarArquivo(e.target.files[0]);
        });

        // Processamento
        function processarArquivo(file) {
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    let todosRegistros = [];
                    // Lê todas as abas para garantir que pegamos os dados
                    workbook.SheetNames.forEach(sheetName => {
                        const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                        todosRegistros = [...todosRegistros, ...json];
                    });

                    if(todosRegistros.length === 0) throw new Error("Arquivo vazio.");

                    analisarDados(todosRegistros);

                    setTimeout(() => {
                        document.getElementById('loadingSection').style.display = 'none';
                        document.getElementById('resultsSection').style.display = 'block';
                        renderizarInterface();
                    }, 800);

                } catch (err) {
                    alert("Erro: " + err.message);
                    location.reload();
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function analisarDados(registros) {
            // Função auxiliar para contar frequências
            const contar = (campo) => {
                const contagem = {};
                registros.forEach(r => {
                    if(r[campo]) contagem[r[campo]] = (contagem[r[campo]] || 0) + 1;
                });
                return Object.entries(contagem)
                    .sort((a,b) => b[1] - a[1]) // Ordenar maior para menor
                    .map(([chave, valor]) => ({
                        nome: chave,
                        qtd: valor,
                        pct: ((valor / registros.length) * 100).toFixed(1)
                    }));
            };

            dadosGlobais = {
                total: registros.length,
                codigos: contar('COD'),
                setores: contar('SETOR'),
                status: contar('STATUS'),
                tipos: contar('TIPO')
            };
        }

        function renderizarInterface() {
            // 1. Renderizar KPIs (Cards do topo)
            const kpiHtml = `
                <div class="metric-card">
                    <div class="metric-label">Total de Registros</div>
                    <div class="metric-value">${dadosGlobais.total}</div>
                </div>
                <div class="metric-card" style="border-left-color: #48bb78;">
                    <div class="metric-label">Setores Ativos</div>
                    <div class="metric-value">${dadosGlobais.setores.length}</div>
                </div>
                <div class="metric-card" style="border-left-color: #ed8936;">
                    <div class="metric-label">Variedade de Tipos</div>
                    <div class="metric-value">${dadosGlobais.tipos.length}</div>
                </div>
                <div class="metric-card" style="border-left-color: #f56565;">
                    <div class="metric-label">Status Principal</div>
                    <div class="metric-value" style="font-size: 20px; margin-top:8px;">${dadosGlobais.status[0]?.nome || '-'}</div>
                </div>
            `;
            document.getElementById('kpiGrid').innerHTML = kpiHtml;

            // 2. Renderizar Insights
            const topSetor = dadosGlobais.setores[0];
            const insightsHtml = `
                <div style="background: #ebf8ff; padding: 15px; border-radius: 8px; border-left: 4px solid #4299e1;">
                    <strong>🏢 Dominância de Setor:</strong> O setor <em>${topSetor.nome}</em> é responsável por <strong>${topSetor.pct}%</strong> de todo o volume.
                </div>
                <div style="background: #f0fff4; padding: 15px; border-radius: 8px; border-left: 4px solid #48bb78;">
                    <strong>📊 Padrão de Status:</strong> A maioria dos processos (${dadosGlobais.status[0].pct}%) encontra-se em <em>${dadosGlobais.status[0].nome}</em>.
                </div>
                <div style="background: #fffaf0; padding: 15px; border-radius: 8px; border-left: 4px solid #ed8936;">
                    <strong>📑 Complexidade:</strong> Foram identificados <strong>${dadosGlobais.codigos.length}</strong> códigos distintos no arquivo.
                </div>
            `;
            document.getElementById('insightsList').innerHTML = insightsHtml;

            // 3. Renderizar Tabelas
            const criarTabela = (titulo, dados) => {
                const linhas = dados.map(d => `<tr><td>${d.nome}</td><td>${d.qtd}</td><td>${d.pct}%</td></tr>`).join('');
                return `
                    <div class="table-wrapper">
                        <div style="padding: 15px; background: #f8f9fa; font-weight:bold; color:#667eea; border-bottom:1px solid #eee;">${titulo}</div>
                        <table>
                            <thead><tr><th>Nome</th><th>Quantidade</th><th>% Relativa</th></tr></thead>
                            <tbody>${linhas}</tbody>
                        </table>
                    </div>
                `;
            };
            document.getElementById('tablesContainer').innerHTML = 
                criarTabela('Frequência de Códigos', dadosGlobais.codigos) +
                criarTabela('Frequência de Setores', dadosGlobais.setores) +
                criarTabela('Frequência de Status', dadosGlobais.status);

            // 4. Renderizar Gráficos
            renderizarGraficos();
        }

        function renderizarGraficos() {
            // Destruir anteriores se existirem
            if(chartInstances.status) chartInstances.status.destroy();
            if(chartInstances.codigos) chartInstances.codigos.destroy();

            // Gráfico 1: Status (Pizza)
            const ctx1 = document.getElementById('chartStatus').getContext('2d');
            chartInstances.status = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: dadosGlobais.status.map(d => d.nome),
                    datasets: [{
                        data: dadosGlobais.status.map(d => d.qtd),
                        backgroundColor: ['#667eea', '#764ba2', '#a3bffa', '#d6bcfa', '#e2e8f0']
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });

            // Gráfico 2: Códigos (Barras)
            const top5Codigos = dadosGlobais.codigos.slice(0, 5);
            const ctx2 = document.getElementById('chartCodigos').getContext('2d');
            chartInstances.codigos = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: top5Codigos.map(d => d.nome),
                    datasets: [{
                        label: 'Ocorrências',
                        data: top5Codigos.map(d => d.qtd),
                        backgroundColor: '#764ba2',
                        borderRadius: 5
                    }]
                },
                options: { 
                    responsive: true, 
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // --- Navegação ---
        function switchTab(tabId, btn) {
            // Remove active de tudo
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Adiciona active no selecionado
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>

</body>
</html>
